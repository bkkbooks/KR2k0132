body:
  text: 東城雜記卷上錢唐厲鶚撰永夀寺寺在慶春艮山二門城隅之間四面皆菜畦野沼舊名永夀菴為南海普濟寺下院康熙四十三年聖祖仁皇帝賜御書額永夀寺富景園武林城東曰東園者宋御園也元張氏展城後迤東十里許民居甚鮮多為池塘畦稜因槩以東園名鄉先輩或云宋東苑似未得其詳按宋史孝宗紀乾道七年秋九月甲午從太上皇帝太上皇后幸東園光宗紀紹熙五年夏四月夀聖皇帝幸東園葉紹翁四朝聞見録孝宗内禪光皇實憲聖所命孝宗遂得日奉長樂極天下之養北宫去東園最近旬浹間即請憲聖臨幸屬芙蓉臨池秀發遂白憲聖請登龍舟撤去闌幕卧看尤佳憲聖欣然從之潛說友咸淳臨安志富景園在新門之東孝宗奉憲聖太后嘗請游幸又重於數戒有司故營是園以邇北宫規置略倣湖山今亦湮廢悉𨽻慈元殿嵗收花果之入焉呉自牧夢梁録城東新門外東御園即富景園四水潛夫武林舊事富景園新門外俗呼東花園灌圃耐得翁都城紀勝城東新開門外東御園今名富景園王士㸃禁扁園有集芳慶樂聚景玉津玉壺富景翠芳並在杭以上諸書班班可考所云新門明代名永昌本朝以其同闖賊偽年號改曰望江俗稱草橋門内地里人尚呼園前街者是已郎瑛七修類稾云東花園宋之富景園也内有百花池今園前民家尚存大池相傳舊矣臨安志又云昇仙橋富景園前南新草橋富景園東今望江門内䕶國禪院前有小橋不通舟楫俗呼為登仙橋即昇仙橋也近山隂許右文尚質寓杭雜咏云富景園開曲巷東風光直與玉津同百花池上頻移艇閒殺江南垂釣翁述古可謂詳核矣又平湖沈修齡遐菴有經富春園故址調寄摸魚兒詞云過城東版兒巷口斜陽催送殘景空園喬木無情物不帶昭陽鴉影還記省奈回首花天月地和烟暝鵑聲啼盡問淺碧荒池淡黄疎柳閒話不堪聽銅駝裏誰惜枝枝紅杏昇仙橋外留映繁華已作浮雲散幾度春風消領闌曲凭數檢校垂旒彈指三生頃昆明刼冷看漢苑螢飛蘇臺鹿走喚起夢鷗醒予亦有過富景園故址調寄臺城路詞云生年落托東城下溪雲素心都負跡似潛夫身如灌圃只記南朝衰柳牆根井口抱一片晴沙眼波微溜縱不言愁露桃愁到不言後探春那回行遍冷餳猶未賣人尚中酒藏謎花樓戲嬰水館别有凭闌紅袖新烟信否過幾度酸風翠梢眉鬬竚立誰知暝鴉飛去久宋畫院陳仲醇泥古録云武林地有號園前街者宋畫院故址也程源南渡後程源為伊川嫡孫無憀殊甚嘗鬻米於臨安新門之草橋著為道學正統圖嘉定十七年聖㫖訪求伊川後特與録用源補迪功郎除貳令監丞元祐初起伊川誥詞云勅鄉貢進士程頥孔子曰舉逸民天下之民歸心焉吾思起草茅巖穴以粉澤太平而大臣以爾好學篤行薦於朝願得試用故加以爵命起爾為洛人矜式此故事也盛名之下尚謹處哉紹興元年九月二日勅通直郎程頥朕惟周衰聖人之道不得其傳世之學者違道以趨利舍已以為人其欲聞仁義道徳之說孰從而聴之間有老師大儒不事章句不習訓傳能自得於正心誠意之妙則曲學阿世者又從而排陷之卒使流離顛疐無所為而死其禍賊於斯文者亦甚矣爾潛心大業無待而興者也方退居洛師則子弟從之者孝弟忠信及進侍講帷則拂心逆指務引其君於當道朕錫以贊書寵以延閣尚其靈明知享比哉可特贈直龍圖閣嘉定庚辰徐公僑為江東倉跋前後二制詞曰右伊川先生舉逸民追贈之誥詞也昔先生居洛以道自任元祐初始應詔未幾以間去中興首明黨議而先生下世矣先生之孫源將以二詞劖諸石先生之道雖不行於時此益以見我朝崇儒重道之意東陽徐某謹書出葉紹翁四朝聞見録程源授迪功郎制勅故左通直郎崇政殿說書贈朝請大夫直龍圖閣諡正程頥四世孫源朕惟道徳性命之㫖具載魯論孟氏之書闗洛諸儒講明益備奈何頃嵗各欲専門遂致邇來横生邪說朕所以悉贈先儒之諡并及張吕之儔曲阜來歸既尊崇於孔氏元日發制復訪後於伊川觀之年高廩而奉祀源方强仕遂命以官庶幾感發人心推明道統俾務躬行之實無為邪說之歸爾其懋哉朕意深矣可特授迪功郎嘉定十七年六月三日右見李秀巖心傳道命録觀之伊川先生三世孫源之父也東皋隠者元末東皋隠者范思賢其先在宋時有為防禦使用醫小兒名隠者去防禦五世其業益精其為醫務利人不務利於人名愈顯又性至孝壬辰之冦鈔掠市井亟擕其母出沒賊中走匿湖山之叢薄家貲不顧也所居錢唐城束地平衍有草木禽魚之樂暇日輒賦詩鼓琴圖冩山川人物以為娯或勸之仕輒曰吾不能隨世俗俯仰不願仕也因自稱曰東皋隠者作東皋隠者贊贊曰有美隠君心夷而氣沖其行既周其惠又以充東皋之陽有木鬱葱或偃而歌或踞而桐俯仰宇宙爵胡我降表兹貞白穆其清風是用作歌以播於邦此天台徐一䕫大章始豐類稾之文也大章又有述徳一篇略云余有子方晬病勿能乳哺吾家去思賢十里許晨起走告之思賢曰子苐先往日加午刻吾來視之既返大雨如注將午平地流潦盈尺吾已必其不來而思賢戴雨笠被毳褐跨欵段馬踵門索兒視予抱兒前視之曰無傷也授以匕劑曰服是當愈吾兒今已長大而思賢墓有宿草恒念之不置云云蓋思賢隠於醫而能以仁厚信誼存心有古高士之風不徒以技術著故一時名流多投贈之作廬陵張光弼昱題范思賢東皋隠居云海水桑田幾變遷桃花依舊郡城邊蔬園百畝充官稅藥價一生供酒錢詩句興來題綵筆道心悟後付朱絃院曹誰信同僚後屈指交游十五年臨海陳敬初基東皋隠者詩為范思賢作云錢唐隠者東皋子讀書賣藥青門裡云是先朝防禦孫至今住近蒲橋市蒲橋東頭楊柳青門前好山終日横承家善起小兒疾好古不求當世名韓康之後誰流亞宋清巳矣無來者世上如今市道人紛紛見彈思鴞炙眼明有此東皋生百年義重黄金輕江湖放浪詩千首風月徘徊鶴一聲顧余亦是忘機客買藥青門始相識為君長嘯上東皋極目千峰倚空碧楊維楨呉氏歸本序錢唐呉觀善字思賢自杭之淞謁東維先生曰善之外高祖徐防禦氏在宋為小兒醫贅壻曰范防禦氏范無子又贅宋四明教授呉氏子從明字公亮承其家而嗣其業南渡後自汴徙家杭之東青門從明生徳誠提領平江醫學徳誠生仁榮杭州路醫學録仁榮生四子長即觀善也善通經史學不専攻岐黃氏之書嘗讀文正范公傳公幼隨母適朱而未嘗一日敢忘其本生卒復范姓君子反本之道也吾隨外甥氏宗于范今將反本於呉禮也已作堂先廬之東名以歸本丐先生大手筆一志庶呉氏子姓有以知水木本源之義也吾悼秦法子壯則出贅世襲以為風義道不正遂不子其子而子其壻致宗祀不明氏族無辨有司詔民者又不以釐而正之至使一門沓雜戸籍其壊倫紀也甚矣善能反本於范徐二宗之外而急歸正於呉非讀書達禮篤正之君子能至是乎缺一字此鐵史筆之故吾樂與之文使代之不肖子姓蹈秦風之錮弊者有所儆也夫東維子集癡絶生陶南村輟耕録王思善繹自號癡絶生其先睦人居杭之新門篤志好學雅有才思至正乙酉間檇李葉居仲寓思善之東里教授余從永嘉李五峰先生孝光訪之時思善在諸生中年方十二三已能丹青亦解冩真先生即俾作一圓光小像面部僅大如錢而宛然無毫髮異先生喜作文以華之爾後余託交於其尊人日華曄遂與思善為忘年交思善繼得呉中顧思道逵緒言開發益造精微故於小像特妙非惟貌人之形兼得人之神氣云郁逢慶續書畫題跋記有楊竹西高士小像嚴陵王繹冩勾呉倪瓚作松石遂昌鄭元祐抱遺叟楊維楨西磵居士蘇大年扶風馬文璧勾呉高淳東海散民錢鼒席帽山人王逢虚白道人茅毅贊思善之筆流傳於世者殊不多見也海神壇咸淳臨安志海神壇在東青門外太平橋之東淳祐十二年有㫖中興以來依海建都宜以海神為大祀下太常議禮詔守臣馬光祖建殿望祭自寶祐之元嵗以春秋二仲遣從官行事宋史樂志有淳祐祭海神詞十六首是時西北地久失於金源而祭祝猶及之其西海位奠玉帛潤安云蓋高斯覆猶隔封疆酌獻類安云我秩祀典四海一家北海位奠玉帛瀚安云一視同仁我心則怡酌獻溥安云惟徳之涼曷奄九州撰詞者不無冀望恢復之意而國是日非元起沙漠未幾巴延之師且駐江上海潮三日不至神之憑依果安在哉今太平橋在慶春門内東河橋之東地近城曲平逺虚曠望見西湖諸峰浮螺攅黛於屋山樹杪亦佳境也聞子將嚴印持結社杭州明季先有讀書社創自聞孝廉子將啟祥張文學天生元馮公子千秋延年暨嚴印持調御忍公武順無勅勅後乃合於呉中復社子將中萬厯壬子鄉試天啟壬戌與嘉定李長蘅同上公車聞警報踵至未及國門而返著有自娯齋集千秋為具區祭酒之孫祭酒秀水人娶於武林沈氏遂家焉愛西湖之勝築快雪堂湖上千秋因入籍錢唐中崇禎己卯副榜貢入太學歸隠秋月菴有煮鶴稾秋月菴稾三嚴自餘杭家錢唐高隠不出兄弟有作朋集天生工書法遺文多散逸東里有報國院在慶春門城隅舊為香林廨院天啟初重建仁和錢宫贊曽作碑記其辭云余與聞子將嚴印持諸公結社其中即讀書社舊地也復社名流數丁陽九標榜太盛幾罹黨禍而數君子蟬蛻自全龍潛不見多以山水禪喜為託比之申屠蟠郭林宗有足多者焉碑有不野而望超不山而聞寂二語狀境殊勝讀書社文序泰和蕭伯玉士瑋與聞子將最善嘗作讀書社文序略云山之致在烟嵐無嵐則枯水之致在淪漪無漪則腐文之致在氣韻無韻則死文之有韻如山之自嵐水之自波舉吾之所挾以為至貴至妙一無所托而後自然之韻乃出焉蘇子瞻云觀士人畫如閱天下馬取其意氣所到乃若畫工往往只取鞭策皮毛槽櫪芻秣無一㸃俊發㸔數尺許便欲倦夫文有所挾以為長人所可得而知者此皆鞭策槽櫪類也至意氣所到天韻獨出止可鼻叅不容目飽廣陵散於今絶矣余至武林聞子將出讀書社諸君子文與余視之脫口落墨不墮毫楮獨留一種天然秀逸之韻倐忽往來撲人眉端如山嵐水波風烟出入年來文章之道蕉鹿之爭紛紛未已為士師者良亦獨難子將以一世沈濁不可以莊語遺物離人而游於獨固善移諸君之情矣灌園生元末潘時雍居郡城東宋輦院故址有隙地十餘畝古井一區簡淡力學詩句脫塵嘗賦徐一䕫獨樹軒云瀟灑幽軒面水開軒前老樹倚雲栽閒來倚杖過三匝醉後支頥看百回風雨欲隨龍化去雲霄常聽鶴飛來結鄰擬共榮枯事遮莫人知是散材客居海鹽之黃灣見海宇兵起遂歸抱甕而隠自號灌園生崇徳貝廷琚瓊為作灌園賦并序云錢唐潘時雍治圃於城東門築垣四周引水成渠以灌園自號其意以為無功而食人之食者元氣之賊萬物之蠧也故勞焉而後食身執其役以給朝夕之費二親無戚戚之憂萊妻有同志之驩吁豢於富貴者不知澹泊之為高耽於榮利者不知道徳之為大既榮而覆古今一轍則灌園之利不已多乎昔於陵仲子辭三公而為人灌園充其廉也向秀吕安灌園於山陽安其逸也潘岳去長安令而閒居灌園病其拙也時雍亦若人匹與或者疑其居有闤闠罔利之習座有俗客鳴聲之聒又安能效彼之所為者非知言也乃述賦以廣其意云賦曰步青門而長嘯遊余心于古初目藻麗而弗近敦樸素而為廬食五鼎為不及飲一瓢為有餘幸免𨽻於征戍或弦琴而讀書恥桔橰之尚巧逐末景而區區其地襟江帶湖青紆黛蓄拱以連山突怒起伏實東南之形勝為帝王之行都周金城兮萬雉列甲第而當衢族茂許史家儗陶朱肆有藍田之玉斗量南海之珠技博古今之妙音㑹八方之殊傾國遇乎燕趙跕利屣而曳輕裾若神人之綽約耀氷雪之肌膚於是命相開藩鎮我南服象天河而鑿池儗紫微而建閣集貂蟬之濟濟衞虎豹之肅肅殫慮乎庶務者蕭曹之倫鋪張乎太平者枚馬之屬衣襲綺紈食兼粱肉塗比車蓋庭奏絲竹巖棲者未睹其盛家食者思發其所畜也乏匡時之明略乃退處乎齊民墾不食之棄壤托鹿豕以為羣疏濁流而逺注闢斜徑而支分筍長渭川之竹菜生雲夢之葷蒲荒秋雨菘茂早春甘者如薺脆者勝芹始芽茁而冒土忽葉布而覆雲荼三名而可食虉五色而成文候靈雞而畢起庶戒逸而務勤冀擷秀於寒暑必浹潤於朝曛恒獨往而無求爰四顧而欣欣乳鳩呼而相應惡草蔓而當耘感生成之攸遂亦有藉乎人人其或風雨之晨燈火之夕俎豆娯親琴尊命客揄竿有鮮充庖有辛夏果磊落秋瓜輪囷兹田夫之所美又焉得獻之吾君嗚呼章綬不優於野服瑤臺何異於蓬室諒乘軒而取譏雖抱甕而奚恤寧陋彼而榮此聊逍遙以終日金谷廢而蛙鳴玉津空而狐穴中雖侈於五畝後孰恤夫一石乃為之歌曰朝汲於河兮其流湯湯暮觀我圃兮其葉已黄炎風卷沙兮白日藏尚昬其事兮毋棄而荒又歌曰登彼陸兮猛虎噬人涉彼海兮白波滔天我藝而灌兮入以事親誓勿彼適兮危其身歌既闋幽情暢白露下初月上陶然一適混乎無象安通塞之有時蹇余行其焉往又寄時雍詩云潘岳閒居學灌園一椽茅屋近青門野烏得食頻將子慈竹團陰定長孫賓客過門車馬合兒童汲井轆轤喧春風金谷空流水且共高歌醉瓦盆張光弼為灌園生潘時雍賦云却惡喧囂逺市廛自耕荒僻浙河邊時非蘇子投書日髩是潘郎作賦年飯客夜舂鸚鵡粒灌園春引桔橰泉嗒然鼾睡茅茨下榮辱何因到爾前按青門謂東青門今名慶春門每經行菘塍𤓰架間髣髴時雍故居所在也西嶺草堂續記洪武中天台徐大章一䕫有錢唐泯上人西嶺草堂續記云錢唐泯上人志行絶俗蚤依雲門法師受度至正中雲門來主下天竺之席上人實侍左右其所棲息則西嶺之草堂近焉西嶺草堂者唐元和中杭之高僧道標師所居也僧史稱神氣清茂為道既高而詩尤精妙與呉興皎然㑹稽靈徹齊名時之名人以摩雲霄三語贊之上人甚慕焉其言曰吾上視師雖不與同世而與同鄉里使師顏面肢體而與吾殊也我則不敢知茍顏面肢體不與吾殊亦奚不可及之有則其中之所存蓋可見已將謀復作草堂㑹兵燹日熾而西嶺之勝汩沒於風塵之中上人曾不少沮仍擇地郡城之東搆屋四楹限以周垣植竹與樹其前後有陂池春夏水長水氣上行與竹樹㑹清芬可挹上人閉門危坐披閱内典以探教觀之要暇則曳袖長吟顧瞻西山搜精錬奇而西嶺岧嶤宛在眉睫間因署名曰西嶺草堂致其志也余曰古之桑門上首積行累業蜚聲一時垂名後世僧史所載蓋亦不鮮姑以錢唐言之若聖達觀之神異辨才淨之辨博孤山圓之孤峻咸似宜慕者而上人顧獨於師是取蓋必有所以然者吾嘗思之學道之士以今慕古必取其質之近似者惟其質之近似故其慕之也切慕之也切精神念慮𠖇孚黙契則其入道也易今人生而同世以某問某猶有不知者上人之生去師五百有餘嵗而獨慕之非有所似惡能自信若是向余謁雲門於天竺見上人氣貌不凡心甚敬之别去日久其法友與余相見輒談上人行業精進而余猶未悉其藴間一造耳草堂甫成止余就宿青燈永夜接膝蒲團之側神清思逺窺其風致隠然有上摩雲霄之意區區世相何得而溷之哉然後知上人不徒慕也吾經有云惟其有之是以似之草堂之作亦何必規規於西嶺之下哉㑹上人謁余請著西嶺草堂續記於是乎書高雲閣明雲間莫雲卿是龍有聞於時近吾杭莫雲卿如鍄亦以文雅好事為名流所重毛稚黃贈詩所謂昔字雲卿者君其伯仲間是也家東園有高雲閣疏泉列樹頗極清曠毘陵惲壽平格與之友善游杭必寓閣上多有題咏句如露蔓平窺石烟蘺半浸池薜荔愁中鬼桃花刼外身舊雨青氊在新愁白髮知無山多怨鶴得樹亦棲鸞一時園林高致賓主交情令人想見余友陳玉几藏壽平在杭日手札二與毛稚黃云從東園縁柳塘行三四里逢橋五六過城北茅子鴻新居時芻牧駏馬駝蹀躞奔驛吹角之聲相聞暝矣不取故道從市中肩摩而趨抵高雲閣中新月已挂高柳之半露蟲大作吟聲此時意君已就卧或尚立檐下哦秋風得奇語正思惲子來叫絶然興倦後不能再穿深巷呼君同上新橋看月也與王丹麓云五月廿三日期又競稚黃東琪虎男次日訪北墅王丹麓㑹大風雨諸子不果來因思客嵗丹麓從氷雪中訪我東園我輩今日盤桓不及王郎逺矣口吟自嘲并題扇寄北墅密雨千門正未開無人同破北山苔雲邊悵望回舟客曾比王郎踏雪來壽平又嘗自號東園客九宫貴神壇徐一䕫宋行都考九宫貴神壇在東青門外一里許以今地度之菜市橋側東青巷是門之遺址元張氏改築杭城拓開於橋東里許壇當在慶春門内城隅矣按咸淳臨安志九宫貴神壇紹興十三年因太常丞朱輅之請以春秋二仲舉行祭禮屋而不壇十八年太常主簿林大鼐乞詔有司建壇於國城之東從之神之版位則夢粱録所云北太乙西南攝提正東軒轅東南招搖中央天符西北青龍正西咸池東北太隂正南天乙是也神之靈爽則宋史禮志所載九宫貴神所主風雨霜雪雹疫所係甚重是也九宫壇分祭初獻亞獻官六部侍郎以上終獻官監察御史光禄卿丞見宋史輿服志紹興祀九宫貴神歌辭十首見樂志方秋厓岳立春都堂受誓祭九宫壇詩云輦路春融雪未乾雞人初唱五更寒瓊幡第一畨花信吹上東皇太乙壇多喇傳楊維楨撰杭城東輝和爾氏奴曰多喇年十九勤敏謹質善事其主主卒某郡宦所多喇誓弗出主户適他姓主奉主婦日謹主婦有機密不以託諸侍必多喇託至正壬辰秋冦至杭刼官民帑藏輝和爾氏家掠貨不得反接主婦柱下拔刀礪頸上諸侍婢皆踰牆壁走獨多喇以身覆主婦請代死且請於冦曰將軍利吾貨豈利殺人哉吾主鑰皆吾掌主婦弗知也吾盡探藏與若乞免吾主婦死冦允解主婦縳乃悉探所藏珠玉寶器散堂上冦俘貨且欲穢其身多喇持刀欲自屠曰我主二千石誓死不辱他主況非我同類乎冦義之去已而泣拜主婦曰棄主貨全主命權也妾受命主鑰失貨而全軀不義也妾請從此死遂自殺楊子曰紅巾冦杭官守者往往棄官遁否者佞事賊名節大閑一蕩去弗顧多喇一婦奴耳終其身事主至以受命自劾非蹈忠節識大閑乎嘻使若所為為國男子非盡臣道乎故余為之傳如五代史録王凝氏之妻者云嘻長生寺余所居舎東一牛鳴地有庵曰曹源無多屋宇環以嘉木鑑以清池頗宜坐夏榜曰古長生寺按咸淳臨安志長生寺周顯徳四年呉越王建紹興十九年㫖充九宫壇齋宫後至元間重建明洪武辛未詔天下清理佛教遂併附於潮鳴寺而廢至萬厯四十年改為小菴仍曰古長生者存舊蹟也范石湖成大次韻尹少稷察院九官壇齋宿詩云草草馳三里蕭蕭共一餐吏方緜禮蕝公自將詩壇隙月窺牀近窻風刮坐寒鴉鳴未忍散端為合併難正指斯地近錫山秦對巖松齡遊杭宿曹源菴贈息機上人詩云小築傍招提安禪絶所思艱難行脚後容易退耕時佛火分池面茶烟合竹枝語深忘去住一榻髩如絲此詩甚佳菴僧書於板以示過客而秦太史蒼峴山人集不載張隠君卿子張隠君遂辰字卿子一字相期號西農少頴異於書無不窺工為詩以國子生游金陵時名大起見賞于董尚書其昌陳徵君繼儒明末潛名里巷為醫自給能探丸起人死人爭迎致之卜築東城詩格益澄澹孤峭多自得之語在西泠流派外可自名家隠君每於嵗闌定勉誡子息云家足過年之用座無寒士之求不惟有愧本心抑且無别庸俗又嘗述其祖龍墩公貧止一布袍除日逢急者即解贈之清門世徳可以激薄停澆矣著有白下湖上蓬宅衰晩四編蓬宅者録其東城所作也忍公無勅招入六逸社簡謝云東城有老生三五接茅屋聲名雖翳如志色不降辱乞食拙叩門爵年少賜粟二嚴天放翁舉逸嗣其六高㑹相招邀寧恥敝冠服寄情在琴歌養老事觴肉詎惜恕疎狂禮容亦簡足持論昩茍同古風良可掬白首永晏言娯懐還厚俗冬暁尋東鄰諸子云東城愛清暁日出在寒林殘葉響氷面微霜留屋隂事皆縁老謝跡剩有孤尋忽漫聞村犬悠然門巷深隠几云一區城曲地還餘隠几蕭蕭落木初賭墅圍棋無子弟故家遺俗有琴書天遙欲縱高飛鵠池白長留禁射魚尚惜興疎交漸絶朝來斗酒為誰儲孫宇台治題張卿子隠居云東城何逶迤樹木紛扶疎中有賢人室緑水繞前除門外多車轍室中唯圖書草木皆秀色僮僕鮮嗟吁客至感心醉朋來結相於借問主人誰其人乃為儒伏邴無恒軌嚴鄭有先驅願得聆謦欬執手日躊躇今里人名隠君所居曰張卿子巷在土橋北許然明許次紓字然明號南華方伯茗山公之幼子跛而能文好蓄奇石好品泉又好客性不善飲讌客每徹宵旦金錯到手隨盡坐是屢困出遊閩楚燕齊數千里外嘗裹金數鎰歸歸數月又盡貧自若也與黃貞父呉伯霖張仲初馮開之諸公善家東城近慈雲寺並城對池境甚蕭灑所著詩文甚富有小品室簜櫛齋二集今失傳余曾得其所著茶疏一卷論產茶採摘炒焙烹㸃諸事凡三十六條深得茗柯至理與陸羽茶經相表裏前有呉興姚叔度紹憲同里許才甫世奇二序稱然明歿後三年感夢於才甫曰欲以茶疏災木今以累子才甫因授剞劂文士結習不能忘情於身後事亦奇矣慈雲寺宋刻雍正庚戌二月余過慈雲寺見階下生臺石柱上有宋元符二年馮謹建普㑹塔一所題記殿壁又有宋景定二年城東慈雲院甲乙流傳住持証據府帖碑乃是臨安府給付住僧崇寧者篆額細如絲髮上作雲螭文甚古城東宋刻僅存此耳東門菜晁無咎補之七述云杭之為州負海帶江而東南美味之所聚焉水羞陸品不待賈而足菜則蔞蒿因陳紫蕨青蓴韭畦芋區茭首芹根藤花羞盤菊葉薦筥薑辛薤淡薺甘荼苦此吾杭之菜見稱於文士之始然未詳所產之地也周平園必大二老堂雜志云車駕行在臨安土人諺云東門菜西門水南門柴北門米蓋東門絶無民居彌望皆菜圃西門則引湖水注城中以小舟散給坊市嚴州富陽之柴聚於江干繇南門而入蘇湖米則來自北闗云此諺至今不改毘陵邵子湘長蘅西湖雜興云杭州食單太濫奢西魚東菜總堪誇楊梅夏熟臯亭好石首鮮來頭水嘉一作西魚者以西湖產魚鮮美異他處也橫河橫河東運河之支流西河水灌市河從城外過壩入焉東西夾以雙橋如眉影窺鏡夢梁録云崇新門外小粉塲前普安橋又名橫河橋其東名廣濟橋今但名東西橫河橋而小粉塲則里人仍稱之其地近城闉樹色高下屋宇參差雨篷烟艇早暮聚集虞長孺淳熈橫河打魚行云霏霏暁霧古城低竹􅐦危橋漁艇迷此時月鈎不落水大魚小魚爭出谿宿鷺憎人翻雪去鷺沙盡被漁人踞飛罾十丈浪花浮赤脚何妨多沮洳魚驚迸散背尾馳嚢頭戢戢交參差老夫無縁救不得飛紅斫玉糜湯池鮹鰷泣釡沸聲切猶記蘆根有殘穴後身願復灂前濡灑子仍憂值江鼈魂歸貝坻訴白龍白龍魚服泳寒風漁人捕得燔枯處急雨打船帆影空龔蘅圃翔麟調蔟水憶橫河紅葉云小艇東偏緑隂曽聴鳩邊雨幾番霜信宛剪就猩綃殘縷恰伴僧牆黃雪落帽風前舞一㸃㸃逐亂流去夕陽暮浴水鳥斷霞攪碎只趂著漁舠住千絲撒網便認作金鱗聚莫是舊溝漂出還有人題句愁吟客夢過呉江路沈正叔沈大亨字正叔號樟亭宅在清泰門宋學士文通之後少為諸生博極羣書善尺牘百函可立待而不善舉塲之文以故艱於遇合中嵗遊京師時華亭徐文貞枋國知正叔才欲留撰青詞積貨可得中舎正叔曰吾得曵裾王門可耳安能鬱鬱久居此遂入貲得楚府典寶正昭王雅志典墳接遇賢士大夫盡禮正叔輔導之功居多昭王春秋漸高艱于子一日引正叔至密地指太史公書某傳謂之曰若堪屬此乎正叔遷延引避叩首曰殿下年力方茂錫麟非逺臣實愚頑不敢奉教昭王咨嗟太息愈欽重焉其守正如此子宜先字尚行號芝暘為人情至哀樂過人長女為馮太史開之繼室太史時未遇食貧不能納禮尚行闢甥館居之父子墓石俱太史所撰文也項子京芝暘圖余友趙谷林家藏項子京芝暘圖一軸山作小斧劈皴崖上古松數株墨桃花一樹崖下芝一本流水潺湲一高士黙坐相對款云芝暘圖山人項元汴為武林沈君冩下有墨林山人印左方跋云汴與樟亭芝暘賢喬梓道義相洽意氣同調厯交世傑凡其遨遊燕楚經必過晤把臂博古逍遙世上今此偕老人各守處僕自向罹家難受制暴黨甚矣吾衰世故灰滅閉門待期遐棄素交曷勝興慨方在戊子秋七月既望兒曹赴省告校重䝉尊君推恩訪惠兼致不遺故情復辱長公寄貽龍井小春茗合想同臭犬馬垂盡之年忽得宿好逺將之美銘佩殊深不憚耄昏拭眵勉力走筆是楮擬作三生後對來因拙技窮斯幸先一盼墨林子項元汴題下有墨林項元汴二印蓋清泰門沈氏故物也如此江山亭詩卷張左司如此江山亭詩卷明時藏城東景隆觀道士史志中處案亭在呉山天慶觀嘉禾周桐村鼎跋云如此江山者有所感而言也必宋遺民有為而作越若千載登高而嘯咏者為一笑居士廬陵張光弼于時元社既屋居士之為此遊一俯仰間何如其為感也作亭者之感尚淺遊者為益深也遊後又無亭矣惟詩卷存獨居士名章章然他或僅附驥耳此卷郎仁寶曾見之名賢妙墨失傳已久今檢張光弼集有如此江山清集同王仲玉陸進之吕世臣作云呉越江山㑹此亭暮春風景晝𠖇𠖇長空孤鳥望中沒落日數峰烟外青不用登臨生感慨且憑談笑慰飄零古今何限英雄恨付與江湖醉客聽其三人之作不可考矣題如此江山亭詩卷姚綬呉山故有如此江山亭初不知作於何嵗名于何人末得廬陵張光弼清集詩遺卷紫芝老人俞和首作籒文碧巖周氏冩圖清絶可愛足以光斯亭于既湮開後來之賡和也是卷今為旌徳史𤣥隠所藏嘗求諸大夫士題咏多以光弼詩中感慨遂為宋元興亡處致意諄諄乎如此江山不曰江山如此上立論無乃過求矣乎且古今江山之趣恒得之林下人其於亭館臺榭興之所到輒以命名就斯亭論之有如此江山可亭矣論亦為通彼豈以一亭之名之微即係以古今興亡之大故哉但以登亭而飲者顧瞻徘徊撫景興感以人非而物在嘅今昔之異同發之性情亦理之自然也則今使有如光弼輩與客復擕飲斯地求昔之亭已摧沒于荒茅蒼竹之間久矣又將何如其感慨耶余輩生逢如此盛世歸田之餘得以優游林下與諸幽人貞士詠歌太平又獲紹續昔賢之作之後亦幸矣間於一飯之頃亦不敢忘江湖之憂於如此江山奚足深論哉至若王公貴人志在行道樹勲業昭聲光于宇宙有弗暇於此或暫得之亦唯一登眺一賦詠之耳求如林下人之趣不可得也𤣥隠藏之尚伺弗暇於此而或一登眺賦詠者出而諗之何如城東倡和序元戴帥初表元城東倡和序略云嵗在大徳戊戌嘉興顧伯玉客至杭東城杭之賢而文者皆與之游而屠存博白廷玉以嵗晏立春前一日過廬清談劇飲甚適既少倦即與循闗坰步江臯眺太伯錢鏐之荒墟弔陶朱子胥之遺跡意色蒼莽襟神飛竦退而存博遂先成古詩二韻六言五章以紀其事既而廷玉有和既和人别為詩而張仲實陳無逸諸賢又皆有和詩遂不可勝紀其氣如椒蘭之交襲而馥也其音如簫鐘之遞居而不亂也其數如針芥磁鐵之不相違而相入也山野土木之人無能與於兹㑹辱以小序見命不敢固辭余按顧伯玉名文琛嘗為郡國所舉辟游燕不遇歸陳無逸名康祖龍泉人官澧陽教張仲實名楧號菊存杭人系出西秦循王五世孫牟巘翁之壻官江隂學正白廷玉名珽號湛淵杭人官江浙儒學提舉屠存博名約號月汀杭人官溧水教諸公皆知名可考惜倡和詩已散佚不傳矣劒石銘劒石元時在城東景隆觀句曲外史張伯雨為銘并序云石在景隆觀長踰等廣不及尺黝碧如鐵鐔鍔具焉余作銘未幾夜半有力者負去銘曰錬質鴻䝉挺鋒嶻嶭正一之氣勿壅勿遏星精内藴玉理旁達瑩謝鵜膏書存紅沫倚天卓地排氣鎭魃兆兹神宫善建不拔戴文進畫蹟明宣廟召戴文進入京為畫院謝廷循所忌逃歸杭隠於諸寺為作佛教諸像今東城華藏潮鳴二寺挂軸尚有存者杭人相傳文進初為銀工所造釵朶種種花鳥人物精巧絶倫思以是傳於後後見銷銀者即已手製也悔而學畫遂有名女亦工畫文進墓在西湖橫春橋葉居仲元葉廣居字居仲至正乙酉間嘗居杭新門之東里教授見輟耕録及閱魏文靖公驥自得齋集序知其先居杭而後遷嘉禾也序云自得齋詩文集者錢唐葉盛維新集其祖元江浙儒學提舉公之所著也惟葉初為括蒼之松陽人以維新之十六世祖銀青府君居元祐黨籍持節濤江遂為杭人後遷嘉禾其子孫青紫蟬聮儒術相業在宋盛時人罕與儷公生於其族實宋吏部尚書贈開府儀同三司南陽郡公諡文康時之六世孫夷考文康以積學從政正色立朝若居臺閣而擊韓侂胄之姦任侍從而定建儲之策述禮經㑹元以明周公建邦立極敦禮崇樂之要其文學政事誠表表偉偉于當時者也公承其家學於書無所不讀其所長者春秋與時之名士曲江惟善錢公嚴陵道原魯公暨廉夫楊公皆以是經名重浙水東西若公之詩文尤舂容浩瀚其理致體裁究其所至殆近古之作者惜乎厯年滋久故散佚不傳者多今維新所集蓋不過千百而什一也公名廣居字居仲别號自得故集以自得名云今集已失傳僅輯其詩六首以備東里文獻云爾題范寛烟嵐秋晩圖云范寛作畫絶代無巖壑交錯青珊瑚玉堂仙人妙題品謂子昻十載見題如見圖亂後圖書盡狼籍奇珍委地無人識蕭條錦褾世間稀拂拭墨痕三歎息題崔君誼友竹軒圖云孔方絶交亦已久忘形三徑相追攀高軒時過翠羽蓋美人或贈青琅玕清風慎截鳴鳯琯滄海勿垂釣鼇竿一朝羣材盡登用空山無人同嵗寒寄楊廉夫二首云江樹春如綺湖山帶暖烟興來猶早起愁絶不成眠賖酒過三月無家又一年故園歸去好猿鳥亦欣然聞道西湖載酒還飛瓊弱翠擁歸鞍可無私夢登金馬剩有新聲到玉鑾異國頓消鄉井念小堂新作畫圖㸔野人未納彭宣履獨向清溪把釣竿題西泠橋隠居云癭木裁冠鶴氅輕十年塵土厭飄零小山舊隠雲封戸大藥新成月滿庭丹井夜交龍虎氣碧霄春躡鳯凰翎西風客舎炎歊淨擬讀琴心内景經西湖竹枝云水長西湖一尺過湖頭狂客奈愁何鯉魚吹浪楊花落聽得櫓聲歸思多又前録葉居仲詩近借得明杭前輩徐伯齡延之號籜冠者所著蟫精雋於四明范氏之天一閣中載葉龍溪詩云龍溪葉廣居字居仲號自得齋宋文康公六世孫雨忩居士伯遜志信之孫也嘗擬黃庭經贈醫師方氏云我有中庭𤣥𤣥根摠攝百氣超乾坤嘘吸日月通崑崙萬神寂寞緜緜存中有一物光燉燉化為真人朱冠褌手執赤符如瓊璊是中實為𤣥牝門三彭潛伏守其閽峯名天柱五岳尊千巖萬壑手可捫南離北坎無衝奔黃媪為媒掌其婚是中有語約不煩子能守之可與論愼勿適越北其轅伏其廬内尋其源方君之居近五雲幽闕夜間常氤氲放之六合空無垠下視濁世癃痼繁以妄易妄何紛紜鍼砭可磨艾可焚熊經止與陀扁倫閶闔朝啟覲軒轅戔戔玉帛臨丘園雨晴偶成云白苧衣裳氷雪容沈郎多病怯東風陽城久拙征科政尹鐸新成保障功滄海樓船何渺渺崆峒小麥自芃芃腐儒自笑憂時切屢過田翁問嵗豐題宋徽宗墨竹云承平天子玉為顏艮嶽秋風竹淚斑丹鳯不歸雲萬里空留翠影落人間又回文詩云紅燭淚消香篆小扇羅如月晩庭空風簾繡捲初醒酒靜院涼生水閣東書李博士扇云水晶宫裏樹毿毿亂後情懐百不堪便面淡山寧得似滿汀烟雨夢江南金中丞别業金學曾字子魯號省吾仁和人隆慶戊辰進士初授工曹旋擢楚學使時江陵奪情起視事言者且得罪公致書政府中有不顧綱常廢斥正人之語辭指激切江陵子入試公置不録既而分守湖南道攝臬篆嵗方大饑公賑恤多方兼封大户倉平價以糶民賴以活者甚衆直指某希江陵意疏劾公鐫三級遂罷歸結孤山吟社有終焉之志江陵歿起用撫八閩數年以老乞休年七十九卒今東城土橋畔公别業在焉里人尚稱為金衙莊也公嘗為太夫人造望江樓極高風帆沙鳥在闌檻間兼擅水木之勝窈窕明靚逺隔市囂矣圓魚大士像閩人何壁客杭適金中丞家招讌過之庖人羮圓魚既熟剖之見一肉觀世音首戴巾帔象白衣粧飾眉目衣褶皆如畫右手下垂左手中按足踏芙蕖一朶座客無不驚惋遂命覆羮見錢希言獪園臯園臯園在城東隅清泰門稍北少司農嚴顥亭先生所築即割金中丞别業之半中有梧月樓滄浪書屋跨溪小太湖墨琴堂緑雪軒芙蓉城怡雲亭諸勝修竹一林平山一簣蒹葭楊柳罨岸被涯引外沙河之流從水門穿塹入園中流經亭閣間束而為澗展而為沼縠紋鏡光隨風日波蕩復注籬外長溝以達於東河倚杖閒聴潺湲有聲城市所無也先生有經世之才寄意每在山澤官都諫以憂歸日相羊其中與汪澹漪書云近匿迹東城苦謝酬應古樹當軒流泉繞戸覺十數年墮落餘生稍稍有清閒之樂何日策杖荒塗一罄疇昔乎及其殁於京邸也徐華徵鄴挽以絶句云卜築東臯闢草堂城隅樓角望蒼蒼清秋風景朱門客他日登臨憶侍郎即謂此園也先生名沆字子餐餘杭人家錢唐順治乙未進士父忍公三嚴先生之仲氏也葯園送春句葯園在東城隅與臯園相望明季呉文學我匏搆軒檻虚敞竹木蕭森玉照堂前玉蘭一株大可數抱高花如雪蓋百餘年物康熈中蕭山毛西河太史竒齡與吾杭諸名士集此作送春詩時橐筆數十人多有佳句末坐錢景舒㫤年最少獨集唐二首其二五六用翁綬白居易句百年莫惜千回醉一嵗惟殘半日春太史極賞歎之後録入西湖詩話東城乞士明季許元孝光禧靈長光祚雁行也靈長有書名結體微熟元孝蕭然人外愛談名理著教典疏意一卷自署曰東城乞士今藏吾友丁敬身齋中按梵語比丘此云乞士東城雜記卷上
