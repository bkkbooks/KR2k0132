body:
  text: 東城雜記地理類八雜記之屬提要臣等謹案東城雜記二卷國朝厲鶚撰鶚有遼史拾遺已著録杭城東有地曰東園者宋故園也其名見於宋史鶚家於此為考里中舊聞遺事輿記所不及者八十五條釐為上下二巻大抵略於古而詳於今然所載九宫貴神壇紅亭醋庫諸條考據頗為典核又紀髙雲閣蘭菊草堂竹深亭及金石中之慈雲寺宋刻劍石銘諸舊蹟俱浙江通志及武林各舊志所未詳他如灌園生以下諸人皆系以小傳使後之修志乗者有所徵引其用力亦可謂勤矣鶚素博覽並工於詩詞故是書雖偏隅小記而叙述典雅彬彬乎有古風焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀東城雜記原序杭城東曰東園地饒水竹蔬蓏翛然清逺先君子因家焉小子生於是居已三十餘年凡五遷未嘗離斯地也每欲考里中舊聞遺事而志乘所述寥寥無幾隣翁野叟拙樸無可與語者因從故籍㕘稽每有所得輒掌録之又於交朋質問復得一二雖見聞陿隘或遇嘉客見臨聊舉為茗椀間談資爾或曰古杭事綦繁何不推廣成書而區區方隅為笑應之曰姑有待雍正六年春三月十有二日樊榭山民厲鶚書於野人舟
