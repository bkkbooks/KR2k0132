body:
  text: 東城雜記卷下錢唐厲鶚撰長明寺清泰門內長明寺宋開寶四年錢忠懿王建名法燈治平二年改今名明萬厯問西竺宗工建華嚴閣􅍥八十一卷真經於上請四明李次公麟畫祖堂百像行筆顫掣衣紋如蓴菜條樹石雲泉勢極飛動錫鉢瓶笠經函坐具之屬種種奇古而唐梵相無一同者寺僧至今護惜之每上元前數日陳設齋供逰人登閣贍禮者踵相接焉夢梁録云仲春十五日花朝節崇新門外長明寺建涅槃會羅列幡幢香花挂名賢書畫設珍異玩具莊嚴道場觀者紛集此亦南渡之遺風也貫休十六羅漢始末城東長明寺向藏有唐髙僧貫休畫羅漢十六幀并出山大士像一幀其羅漢題款云信州懷玉山十六羅漢廣明初於登髙和安送十身乾寧初冬孟草二日於江陵舟續前十本相去已十六年時景昭禪人自北來見請當年將歸懷玉西嶽僧貫休作字為小篆體其畫法之奇逸飛動向讀歐陽炯長歌嘆其妙絶如聽經弟子擬聞聲嗑睡小童如有夢繩牀木屐兩三片線補衲衣千萬行今始親之也相傳明神宗時慈聖太后以賜紫柏大師大師坐妖書事於獄中示化此畫歸法嗣某流傳至杭藏一小菴本朝嚴侍郎沆盧職方之頤共捐千金購得喜捨寺中有年矣世宗皇帝初年敕改西湖行殿為聖因寺制府李敏達公衛請至聖因永充供養余按宋趙希鵠洞天清録云信州懷玉山有畫羅漢郡中每迎請祈雨常有一二身飛過寺中即此畫也其靈異有如此者魏德剛元末魏德剛家東城辟臨安學官受春秋學於應之邵之邵歿復學於楊亷夫著春秋左氏傳類編凡十二卷亷夫為之序李宗表曄有懷德剛詩云東青門頭有惠連五載不見夢相牽得歸茅屋對秋雨與子細説逺逰篇其為名流所傾企如此惜乎著述無存名亦幾湮滅矣東里草堂元至正間有王維賢者隱居嗜古所交多勝友築東里草堂於城東張光弼題詩云周遭多是及肩牆馬過猶知舊草堂苔徑雨晴蝴蝶亂藥欄風暖牡丹香詩篇未覺為時重杯酒能留共日長豈是􅜁川無作者却同裴迪賦山莊廣陵成原常廷圭亦留題云平安一橋吾舊遊君屋乃在橋東頭晚山得月更宜酒春水到門還放舟太守詩成寫素壁老大興發思滄洲淮南叢桂不得往撫卷因之生逺愁時原常蓋避地南遊與之交云又題維賢所藏盛子昭雙松繫舟圗云雲門寺前風物幽布襪青鞋吾昔遊葫蘆盛酒待明月舴艋載琴當上流長松並立幾千尺狂客一别三千秋何當挂席過湖去東里草堂姑少留雲門寺在越凡過客之由杭東渡者必於斷河平安一橋登陸古人詩語無虛設如此湖謂鏡湖也芝蘭室圗元時錢唐髙僧古林昌公幼祝髮于寶石山戒律精嚴智慧明了曾分淨慈之半席晚年築室於城東偏移植紫藟列樹蘭蓀倚檻則清心濯目憑軒則衣芳佩馨於是王蒙叔明為芝蘭室圗并作記俞和子中為之書一時題咏者頗衆蒲菴來復云不著維摩獅子牀芝蘭為友産清香商巗采到連莖瑞楚畹移來奕葉光春雨苾芻還並秀曉風簷蔔每同芳也知臭味通元化物我冥觀與世忘臨川危素云築室古城曲樹此蘭與芝異芳間竒石宛有山林姿芝蘭日長茂離披滿前墀緑葉泫朝露五色含晴暉道人方燕坐境寂神不馳色香了無取眼鼻忽若遺嗟豫老京洛無地結茅茨浩歌望江水白雲有餘思南屏山人夷簡云不以芝療飢豈用蘭為佩芝秀蘭自馨植此一室內道人結習盡與物了無礙白晝敞禪扉羣峯逺相對始豐徐一夔云草中惟有芝蘭好不數宜男指佞賢近喜亦從蕭寺種誰云獨許謝庭專尋常道氣留君子窈窕風姿媚佛天何用旃檀林下住只將瀟灑度年年白雲峰如蘭云芝蘭百本繞階墀曄曄瓊英間玉㽔楚畹風光搖緑葉漢宫春雨長銅池香飄衣袂堪紉佩味入齋厨足療飢謝氏芳華歸寶石封胡羯末宛同時錢唐白笵云禪扃閉幽寂石室生清芬奇葩雜芳樹藹然祗園春如何尋丈間迥與人寰分聲聞已知妄色相元非真願以甘露枝淨灑濁世塵餘芳倘可即相從問正因京兆宇文公諒云紫芝采為食幽蘭紉作佩聊復助熏修庶幾堪傲世一室靜生香諸塵自融會蒲團禪燕餘經卷了空外嗒然吾我忘誰云有三際金華宋璲云隱居結蓮社地僻無人聲瑶草穿階緑幽蘭入夢清吟詩憐楚澤分坐憶南屏色映千華偈香同九畹英何當風月下相對説無生此圖向曽録入汪玉水珊瑚網中土橋土橋在新壩之左近慶春水門通外沙河之流湯堯文煥土橋縱步詩云徑以城隅僻人因靜裏過敲門遙問竹掃石近侵莎堯文號鄰初道人仁和人中隆慶庚午鄉試官贑州府同知有書名新壩慶春水門明時以東郊地僻鹽徒闌入不可禁奉旨久塞虞司勳淳熙卜居於是門近土橋不通舟因佃為放生處諸仁者競載魚鱉螺蚌之屬來在藻於牣可千萬億命也萬厯中賈豎欲奪會安壩曵木之利揚言慶春入巽水主大吉賄有司啓水門築壩曰新壩是年司勳敗官中丞直指兩臺皆中誣去里中自是無富民詳見司勳巏務山館集惲夀平詩惲壽平寓杭日有在東園柬毛稚黃詩云海棠茫茫春霰斷柳絲緑遍寒江岸細網幽窗竹煙亂山桃海棠落將半鳥聲過殘雨蘭風細吹案我思在空谷我夢屬雲漢珩璧只獨照錦衾空宵爛飛花濛濛還坐歎江郎操筆不在腕石泉水芹泛溪館栁下無人待誰鍛風致俊逸可以奪昌谷玉溪之席矣徐茂吳徐桂字茂吳餘杭人中萬厯丁丑進士授袁州推官守正不阿失上官指投劾歸僦居杭城之東隅地幽僻擅池亭竹木之勝多蓄彛鼎書畫日婆娑其中有潔癖客過者先使人覘冠服鮮楚方與接對人以是怪之與馮開之屠長卿同榜皆罷官家居扁舟雙履往來吳越間著有大滌山人集送義公結廬天台云海上栖禪境披雲訪石橋一瓶依澗壑疏磬落山椒華頂經年雪松門半夜潮預愁支遁去誰與共逍遙朱竹垞前輩録入明詩綜格調誠清拔也雲泉題詠序元初虎林城東徐文雋字如心扁其書屋曰雲泉紫陽方萬里回為雲泉題詠序云有天地然後生萬物故易有乾坤之卦而繼之以六坎之卦以天一生水而潤萬物者莫潤乎水天地雖生萬物非水則莫生也然則六坎之卦以屯蒙需次乾坤何也凡有坎之卦皆取象于水而屯需之卦取象為雲蒙之坎取象為泉又何也天之始生物也猶上雲下雷而為雨物於是芽茁于冥昧故曰屯以次乾而坎為雲天地之既生物也猶泉之初泄于山物於是幼稚而未壯長則不可無所養故曰蒙以次屯而坎以為泉物屯而亨蒙而養待其成而已故曰需以次蒙而坎又為雲此天地之屯也天地之蒙也天地之需也聖賢者出亨物之屯養物之蒙始也無所不用其力以需夫各正性命之定則終也無所用其力今之學者亦嘗讀易而知之否乎虎林城東徐如心偕鄰友童汝舟來謁謂其讀書之室扁曰雲泉老于風騷者爭賦之豫以為斯友也年始二十有七自芽茁幼稚而壯長者也其亦嘗次序屯蒙需三卦之坎而玩之否乎聖人所以不曰水而曰雲曰泉何也水之始初為雲為泉學者不慎其始初聽其流注散漫為渺茫無畔岸之水可乎何謂經何謂綸何謂果行何謂育德亨已亨人養已飬人此感彼應姑少需之飲食宴樂而非流連荒亡之謂也是為雲泉題詠序有文見桐江續集四十五卷馬婆巷元奉化戴帥初戊戌清明杭邸坐雪絶句云思鄉處處只愁生正好春遊又不晴雪是梨花雲是栁馬婆巷口過清明按巷為宋舊名今俗呼馬坡近東花園為上馬坡北抵清泰門為下馬坡用之入詩頓饒雅韻虞長孺僧孺萬厯中里人虞司勳長孺以文字為佛事碑版疏頌照耀東城長明蓮居二禪窟貞石猶存其弟僧孺淳貞終身不娶結廬靈隱寺側名猿狖居役使僅一老僕又建八角團瓢於每角藏書上有樓可眺逺馮祭酒開之嘗曰於陵仲子猶餘辟纑之妻僧孺足稱今之逸士矣城曲茅堂藍瑛字田叔杭人善畫山水知名於時家東城自號東臯蝶叟又號東郭老農榜所居曰城曲茅堂子深字謝青為諸生亦以畫名龔蘅圃翔麟城曲茅堂感舊詩云他年文酒地腹痛此停軒病葉黃堆徑寒流緑映門斯人不可作茅屋至今存但有空梁燕喃喃對客喧胡淯清胡守乾字淯清臨清人父尚英明神廟末進士官翰苑以忤魏璫削籍歸思陵立召用至宫詹學士而卒守乾外家本杭人也母擕之居杭十餘年家益困乏賣卜於城東市中得百錢輒下簾事吟詠人不知其貴公子也西湖竹枝云長絲成匹竟難裁傳語渠儂莫見猜春日未能尋藕去炎天那得見蓮來是亦不失鐵史遺音者蘭菊草堂徐子貞元末隱居城東號匏瓜道人洪武初仕為潭府典寶正所居曰蘭菊草堂天台徐一夔為之記云錢唐徐子貞甫亷介有雅操築草堂于城東隅不蒔他物獨蒔蘭與菊而日循行其間客或見之曰子愛此耶子貞曰吾愛其與吾性合爾既而大書蘭菊草堂四字而請豫記蓋蘭之為物生于澗谷深絶之地人雖不采而清芬細馥灑灑然於風露之下有不求媚於人之意焉菊之為物發于卉木雕落之後時雖揫斂而幽姿雅艷采采然在風霜之表有不爭妍于時之意焉之二物者有道之士所不棄也方子貞隱處時人見其戀嫪此二物不置固曰其性然耳而不知其見于用者何如也及遭維新之朝盡起天下之遺逸而用之子貞起自草堂得以才行選為親王官屬趨蹌王庭一以直道自持如蘭之不求媚于人菊之不爭妍于時為王所禮貌所謂國有道不變塞焉者蓋如此詩曰惟其有之是以似之豈不信然子貞之所守可謂不愧蘭菊矣因筆之為記張光弼為子貞賦匏瓜道人云吾豈匏瓜繫此生道人玩世以為名百年雨露司榮悴一日江湖見老成濩落情懷莊子瓠浮沉蹤迹楚王萍壺公借與龍為杖拚著青鞋到處行徐鏡非徐行恕字鏡非茂吳司李之姪也世以易名家中萬厯癸卯浙江鄉試嘗為德安縣令後與嚴印持張卿子稱城東三髙士詹去矜鍾玉贈之詩云徐公本亷令髙擬陶彭澤早歲擅時名垂老厭兵草晦迹城東隅蕭然半畝宅茶人夙自署茗碗供朝夕健兒不敢窺閉門無俗客擾擾市朝間世眼徒青白張子卿過徐鏡非間坐詩云朋舊今無幾所欣俱老翁纍因遺嗣少間賴一官窮每過寒齋雨共聽秋樹風商山多翊贊吾願採薇終鍾紹京書鍾紹京書五帝六甲經後有倪雲林跋尾明時藏徐茂吳齋中近閲沈景倩野獲編云本髙瑞南家物後歸徐司理近聞為徽人厚募篡去直是許髙陽女賣嫁蠻酋不止昭君和戎也半畝居半畝居一名孝慈庵近艮山門城東隅順治初里中周氏子兄弟出家奉母于此中有放生池積水深淨風篁繞户人迹罕到真憩寂地也俍亭禪師淨挺夜過半畝居詩云月色滿城隈一燈懸古屋平郊逗微茫踈星淡幽獨梵唄雜鐘磬琅琅振林木抱甕此灌園何必異深谷俯仰輿蓋寬間間情自足分坐成主賓阿閦及金粟俍亭為仁和徐繼恩字世臣明季壬午貢生晚剃染於河渚著有溪流文字委順齋元時杭之城東隅有鄭處士號虛原年八十餘研極乎漆園之旨名其燕處室曰委順齋楊亷夫為之記文見東維子集多訛脫故不録鍾馗圗鄭虛原家藏鍾馗圗為舊人筆至正甲辰春以贈海虞曹立立跋云先君昔遊錢唐觀此卷於鄭虛原翁處歎其瓌怪幽眇曲盡鬼物之情狀鄭君欲以相遺先君亦不之請也後先君歿六年立至杭謁鄭君於棲遁之室情意款洽撫問存歿不勝惻愴因出此卷歸之且曰而翁之夙好也吁鄭君護持此卷於兵火艱棘之中以先君有屬愛之心不以畀人而有所待一旦識余為故人之子卒能授之其亦庶幾延陵氏脫劍之意乎卷中題者四人海粟馮子振詩云老馗兀與二鬼肩一鬼勃窣袋影懸一鬼負劍帽帶旃一鬼頂顱雙角駢老馗之婦輿蹁躚其荷輿者鬼婢虔抱貓掌握鬼妾妍提其奩具風袂玄擕枕而從服飾鮮鼠蠍黏綴袴亦然擎擔最緩行李便鬼之嬰孺盛穿聨囊包槖裹琴能仙瓠壺穹挂吁可憐揭竿之魅愁攀緣最後甕鬼束縳椽尸而行者猶能前肌肉消盡骨骼纒物怪種種來無邊神禹鑄鼎今幾年罔兩在此猶翩翩吁嗟吁嗟問老天不惟詩畫奇絶而鄭君之友道有足取焉洪稗畦洪昉思升號稗畦居東里之慶春門少負才名尤工院本南北曲以國子生遊都門暇取唐人長恨歌事作長生殿傳奇一時勾欄競抄習之會國忌止樂貴人邸第有演此者為言官所劾諸人罷職昉思逐歸朱檢討錫鬯酬洪升詩云金臺酒坐劈紅箋雲散星離又十年海內詩家洪玉父禁中樂府栁屯田梧桐夜雨詞悽絶苡薏明珠謗偶然白髮相逢豈容易津頭且纜下河船元人白仁甫有梧桐雨雜劇亦寫雨淋鈴一曲用事可謂工切昉思後溺於烏鎮王司寇阮亭挽詩云送爾前溪去栖遲歲月多莵裘終未卜魚腹恨如何采隱懷苕霅招魂弔汨羅新詞傳樂部猶聽雪兒歌中年欲卜居武康山中不果所著稗畦詩集清整有大厯間風格嘗有林月前後入溪花冬夏開之句世但艷稱其曲子耳藝隱橫舟城東清泰門宋之崇新門也舊在東河內河流繞城而轉過東新關達於臨平抵長安堰近城河干宋有船官廨嘉熙中施樞知言嘗為是職有題廨宇詩云合是清溪近處居在官却與在家如柳風拂岸時鳴櫓梅月橫窗夜讀書休問舟間無喚渡須知水到自成渠俸錢已足供新粒比著簞瓢儘有餘樞自序其集曰丙申冬趨浙漕舟官戍小廨泊崇新門外傍河依柳髣佛家居刳剡之餘時作一二解殊自適先正詩云野水無人渡孤舟盡日橫與樞官業偶同遂命曰藝隱橫舟藁潮鳴寺城東潮鳴寺故為梁貞明中建名歸德院後宋髙宗曽駐蹕聞濤聲賜今名髙宗御書蘇詩賜殿前統制劉漢臣咸淳臨安志云書古詩立石東廡者是也吳伯霖之鯨以詩為髙宗作載之武林梵剎志誤矣李君實六研齋筆記云武林潮鳴寺有宋思陵賜統制劉漢臣詩野寺參差落漲痕踈林欹倒出霜根扁舟一棹向何處家在江南黃葉村此蘇子瞻詩也第二字是水字今改寺字遂掩而有之思陵博雅斷不如是當由偶在寺中書之賜劉寺僧欲假以為重改字勒石以侈榮觀耳觀此則宋時原刻後明時又有改字之刻今寺厄於火并改字之刻亦亡矣紅亭醋庫咸淳臨安志紅亭醋庫在菜市橋東街南面北今名醋坊巷宋時酒醋皆官庫醖造納緡錢于户部臨安有醋庫十二此其一也但今巷在東街北面南與志異耳莊季裕雞肋編載建炎後俚語云欲得富趕著行在發酒醋蓋宋自王安石設法賣酒并醋亦𣙜之南渡後軍興百費浩繁遂不能革既禁私造其直必昂遂有因此致富者矣回龍橋明仁和沈通判懋德儀兩湖麈談云郡城東潮鳴寺門徑曲臨通衢其東南北三面皆水水之外皆菜畦而寺獨踞其中竹樹幽茂人迹罕到儼然一山林也詢之僧云寺舊名歸德南宋髙宗駕幸至此聞潮聲而回因易今名今寺後有小橋曰回龍即當時旋駕處也按臨安志菜市橋之西為東青門寺當在城外其迤東十數里則江塘也故潮聲可聞至於今日則城郭一變與曩者不類矣沈公為少司寇鋭子正德己卯舉於鄉嘉靖中仕至惠州通判今去沈公又二百餘年此橋尚存跨荒溝上僅一石杠耳織成十景圗杭東城機杼之聲比户相聞郎仁寶云起於禇河南九世孫載善織作綾錦今禇家塘通聖土神是也其中一區供尚衣之匠花樣有為西湖十景全圗者秀水朱稼翁稻孫武林恭紀詩云十樣西湖景曽看上畫衣新圗行殿好試織九張機蘭芳軒貝清江瓊蘭芳軒記云永嘉李至剛氏僑居錢唐城東闢室為遊息之所樹蘭其前額曰蘭芳軒間求豫作記按蘭與澤蘭類紫莖赤節葉鋭而長古人恆刈而佩之劉次莊之注已詳而黃太史又以一幹一花為蘭一幹數花為蕙朱子從而辨之且言今所見者花雖有香而葉無氣非可刈而佩者然亦不知古人所指何物也由是觀之天下之物其芳至獨而不變者莫過於蘭而楚屈原著離騷以見志舉而稱之者不一則原之守比蘭之芳已故其好修自潔朝夕而不倦也則曰豫既滋蘭之九畹兮又樹蕙之百畝及時俗之好讒惡直而不能容也則曰户服艾以盈要兮謂幽蘭其不可佩夫蘭别於衆草故不與時俱化而獨芳君子别于小人故不與俗俱遷而獨立使俱化而俱遷則芳委於臭腐而美淪于淫僻矣至剛之托乎蘭其亦有原之志哉豫聞至剛蓋五峰先生之從子弟早有氣節嘗從武夷杜君清碧逰二十餘年渡江而北涉黃河覽太華客寄京師落魄不偶而南歸吳門一時將相皆欲屈而致之幕府至剛弗屑也然不能不病蘭之弗艾若矣吁蘭之香小夫孺子能知之至剛能不失其守如蘭芳之不變豫知必擢于等夷而蜚聲天衢也于是乎書按珊瑚網題趙子固水仙卷云天台李至剛又有李至剛名鋼以字行華亭人洪武中舉明經試禮部郎中出為河南布政司參議永樂間仕至禮部尚書解縉沮上立漢庶人髙煦至剛黨髙煦以譖縉上震怒逮縉下詔獄死見明閣學記蓋傾險之流也其僑居錢唐當别是一人沈柳亭沈豐垣字遹聲號柳亭仁和人少為諸生學于臨平沈去矜最工為詞纏綿處似柳屯田清穩處似趙仙源至不肯上鞦韆為怕東牆近之句雖古人無以過之也嘗愛東城之幽曠因卜居焉賦一萼紅云近城偶有千竿修竹正好結吾廬試蓄水成池鉏泥作圃添栽幾種嘉蔬將怪石圍成曲徑映藥欄深處獨蕭疏蓮子生花蜂兒釀蜜快意何如最喜繁喧迥絶交情冷落細閲圗書幾陳風來一番雨過苔痕緑遍階除此際長容髙卧更何勞惆悵憶黃虞睡起間消茗碗自許清癯張天生張文學元字天生武林人居東城一㕓庳隘積書萬卷朝夕諷覽不輟尤鋭于經史之學注名復社年八十餘卒徐孝亷蘭生之瑞以詩哀之云廣筵雄辨解談經一代風流屬老成千載龍門徴續史授書誰是禇先生寧都曽孝亷庭聞畹有懷天生詩云烽煙阻絶故人違回首楊花夾路飛自是樓船吹畫角知君薜荔掩柴扉六橋歌舞春風斷三日錢唐潮信稀老大乾坤空炙背亂藤孤樹雨霏霏歿後著作不存即二詩可以想見其人矣張野花曹藎之舌華録云武林張卿子有野花詩十首佳極盛傳一時人目之曰張野花卿子善病嘗數年不出户面孔黃瘦人有見之曰是野花張也惜十詩集中不載想少作耳靈芝寺靈芝崇福律寺在城東清泰門內稍南俗稱蠟燭菴吳伯霖武林梵剎志云唐貞觀間郡人施光慶捨宅建名實際院元季燬元統間僧妙通重建竟不詳改額靈芝始末考咸淳臨安志城東無靈芝寺并無實際院但有寶積院天福七年施光慶捨宅建舊名崇福後改今名紹興十五年以其地為駝坊象院明夏時正杭州志靈芝寺本在湧金門外錢王故苑芝生其間捨以為寺故名靈芝髙宗孝宗凡四臨幸有浮碧軒依光堂亦為新進士會拜題名之所元季燬移建城東合觀二書則寺即湖上故迹元統中始徙于廢駝坊象院仍合靈芝崇福為額而實際乃寶積之訛貞觀乃天福之繆不然豈有兩施光慶捨宅乎宋大智元照律師字湛然餘杭唐氏子博究羣宗以律為本嘗著布伽黎杖錫乞食於市楊次公贊之曰持鉢出持鉢歸佛心常在四威儀初入鄽時人不識虛空自有鬼神知居靈芝三十年從遊嘗五百衆政和六年示寂塔全身于寺西北明正統間徴杭州靈芝寺僧智淳説戒開壇為天下傳戒宗師乙亥年辭朝沐浴而化上遣禮部趙朂諭祭智淳曰爾夙悟善緣堅持梵行邇膺榮命為釋宗師方闡法音導人為善倐爾示寂良可悼嗟靈其如存服茲諭祭自元照以來為律宗焉郡人陸拒石繁弨募重建靈芝寺疏略云靈芝寺者乃兩浙之名基錢唐之靈址聿開太平之嵗重興元統之年椒房桂殿翻作禪宫太液昆明俄成寶筏節菴修三藏之書純一較五雲之典建章宫裏座是蓮花華林苑中麈成白玉片蘆北渡半偈以解萬緣一錫南飛三年而化諸品遂乃橫開銀闕髙峙瓊樓蕉葉火珠繚繞露槃之塔陽烏隂兔回翔方丈之池法鼓雷鳴天香霧積信可以跨鳳山之仙境軼蓬島之香城者矣郎仁寶郎瑛字仁寶正嘉中仁和諸生與馬浩瀾洪王天碧澄金玉泉珊王蔭柏一槐相友善居草橋門內景隆觀前自號草橋子博綜羣書恣意搜討于進取泊如也有愛之者曰如後時何瑛曰吾已委身載籍矣尚復與諸少年齗齗爭甲乙耶因作脾對以見志著七修類藁五十五卷行於世其中考訂精核間有紕繆然多舊聞逸事與瞿宗吉歸田詩話徐延之蟫精雋吳樂間武林紀事薑叔明蓉塘詩話沈懋德兩湖麈談田子藝留青日札陳貞亭禪寄續談並稱吾鄉前輩著述之傳世者薑西溟卜居慈溪薑西溟宸英績學能古文辭書得晉人筆勢逰長安名動公卿間曽被薦以上舍生食七品俸與修明史及一統志康熙丁丑第三人及第入詞館苒苒老矣嘗與宗人約買錢唐東園屋將告歸遂初焉送項霜田歸杭州句云我愛東園宅繞池青琅玕主人有成劵卜居諒非難所願遂鄰並非久同盤桓又送湯西崖編修移居句云一椽如可托凖擬住錢唐其眷眷於東園如此後以科舉事纍斃于貴人牢卜居之約徒成虛語惜哉瓦子巷瓦子鈎闌南宋在臨安有二十三處其在城東者新開門外新門瓦亦名四通館薦橋門瓦在崇新門外章家橋南菜市瓦在東青門外菜市橋南艮山門瓦艮山門外瓦舍者謂其來時瓦合出時瓦解之義紹興間殿帥楊和王因軍士多西北人是以城內外創立瓦舍招集伎樂以為軍士暇日嬉遊之地貴家子弟因此破壞尤甚于汴都也諸伎如賽觀音孟家蟬吳憐兒等以色藝擅一時家甚華侈唐安安最號富盛又如金賽蘭范都宜倪都惜潘稱心吕雙雙胡憐憐沈盼盼普安安等皆以歌曲得名至唐安安理宗曽于元夕召入禁中潘稱心亦為賈秋壑所狎今遺迹皆不可考獨菜市橋瓦子巷其名猶存吳君特咏京市舞女玉樓春云茸茸狸帽遮梅額金蟬羅剪胡衫窄乘肩多看小腰身倦態強隨間鼓笛問稱家住城東陌欲買千金應不惜歸來困頓殢春眠猶夢婆娑斜趂拍今則委巷蕭然知其事者亦鮮矣玉玲瓏閣玉玲瓏宋宣和花綱石也上有字紀嵗月蒼潤嵌空扣之聲如雜珮本包涵所靈隱山莊舊物沈氏用百夫牽挽之力致之庾園後歸龔侍御翔麟因以名其閣焉侍御為太常卿佳育子風流淹雅少日喜為樂章出入梅溪白石諸公太常開藩江左署有瞻園禾中朱檢討彛尊李徴士良年上舍符沈明府皥日上舍岸登皆在賓榻酒闌棊罷相與倡和刻浙西六家詞行于時又屬王山人翬寫瞻園舊雨圗後以貢士起家厯郎署至南臺未幾罷歸貧甚至舉家食粥未嘗于監司郡邑有所干請士論髙之晚年移家白洋池畔自號田居舊宅已易主玉玲瓏之名終播于詞人傳之海內矣朱檢討寄侍御摸魚兒云玉玲瓏閣前松石經過朱夏曽撫主人直待秋期近金粟滿庭香雨新樂府早和遍薲洲笛譜篔房句竹垞小住笑我若歸時留君爛醉十日不歸去西堂冷孔雀應凋翠羽鹿麑髙下騰距紅泥亭子方池外深徑共誰延佇嵗既暮想皖口鱘魚又好霑犀筯粉雲風絮定吹到山樓叢梅凍雀把盞舊吟處碧鳳堂靈芝寺舊有碧鳳堂成化癸卯嘉禾姚公綬嘗寓其中公綬辭官最早以山水翰墨為娛嘗得錢舜舉山居圗卷後有張貞居仇山村顧玉山鄭明德等諸名勝歌咏題跋竒愛之行笈必擕以自隨題其後云三日不展卷何異隔三秋今日一展之頓然銷百憂片紙與隻字古人尚見收矧茲美圖史契我山居幽林鳥當我啼石瀨當我流寄傲倚南窗濯足弄扁舟回視五陵內輕肥乃浮漚吾生寶此卷俯仰盡優遊五月草五日因訪韋菴亷使假榻于杭靈芝寺之碧鳳堂對雨無聊捉筆書此雲東逸史記前輩雅尚如此風致猶可想也陳際叔柴虎臣二處士陳際叔廷會九嵗操管作寇萊公枯竹生筍賦人皆奇之稍長補錢唐諸生效漢魏六朝人為文與同郡陸麗京圻鯤庭培交好嵗乙酉鯤庭以行人殉國難絶吭于桐塢引決時留書與際叔别且盡以書籍遺之際叔聞信奔赴哭之慟為書以報地下美鯤庭之得死所敘已有母尚在草野不即相從之故詞甚激昂宛惻無何陸氏竄徙駱村鯤庭配陳夫人延際叔於蕭寺教其子繁弨學既成乃還其所與書籍其交誼如此柴虎臣紹炳仁和人御史祥之孫也少為諸生見賞於紹興司李陳公卧子後棄舉業杜門掃軌以醫自業詩文馴謹中程度如其為人際叔嘗稱之曰虎臣著作雖侈不為虛辭濫説可謂質有其文者也兩處士皆家城東偏而虎臣居尤僻老屋數楹厠於壞垣廢圃間枯桑敗竹三徑荒寂際叔時過從劇談奮袖低昂擊節起舞雖樵蘇不爨意氣甚豪也際叔有瞻雲集虎臣有翼望山人集與麗京及張祖望綱孫毛稚黃先舒沈去矜謙丁飛濤澎吳錦雯百朋孫宇台治虞景明黃昊稱西泠十子云項霜田項溶字霜田居東街少司馬眉山先生景襄之仲子也少豪蕩及長折節讀書以太學生赴京兆試所交遊多四方名士聲稱藉甚然數竒試屢蹶歸而從酒人遊嘗露頂短衣持蓋障日行市中軀幹偉然性愛滑稽時于廣座中有所調笑或作為詞曲輒被輕薄子傳述人以是多畏之睌年竟淪落而卒余于嗣子處覔得其北逰遺藁一卷今録三首于此青駝寺云得得蹄聲急前村燈火微山川非故國塵土上征衣見月人投店聞言犬出扉昔年曽此宿殘夢尚依稀羊流店云三公寧折臂一紙是戡吳策馬登前嶺回鞭問僕夫寒煙低逺樹落日淡平蕪陳迹茫茫處豐碑得在無齊河縣云日晏停鞭未猶餘半日程圓沙明野渡老屋帶孤城石迸車聲疾衣沾柳絮輕年年新漲發碧浪比潮平評者以為有元和大厯間風骨洵不誣也蓮居城中精舍最多惟蓮居為勝其地左負郭右亘土橋門外清流縈帶循六枳之籬而入一往深窈寮舍堂殿如蜂王國如燕子巢户牖相向皆極低小古木離立突怒䨴鬱緑蔭滿階苔痕常如雨過妙香時聞翛然有出塵之想矣明萬厯時大覺瓏禪師所創師戒行精整沈嘉則屠緯真吳伯霖諸名勝皆與之遊有一碑虞長孺之文經竒李長蘅之書瘦硬宋比玉之篆蒼嚴足稱三絶白雲漫士元陶煜字明元自號道奧山人又號白雲漫士台州人以試吏年勞省除杭州東北隅録事司典史輝和爾人拜布哈與其妻呼喇珠自昔同艱苦生女已十年一朝為省宣使乃娶呼圖克女觀音努為小妻貌美資豐善迎合至抑正妻正妻不勝憤布哈擲刃以剚弗斃閉一室囚之及其女日少與食欲俾餓死乃使婢訴主母枉于官録事揮使去君曰此婢去三人必俱死于是叩頭白憲府使得伸理獲全布哈雖遇赦釋免猶坐黜至正壬辰除歸安縣平反寃獄按抑豪強此類甚多子三人長即南村先生宗儀也詳見鄭明德僑吳集陶君墓碣中按元史百官志云凡路府所治置録事司掌城中户民之事中統二年二千户以上設録事司候判官各一員二千户以下省判官不置至元二十年置達嚕噶齊一員省司候以判官兼捕盜事典史一員地理志云杭州路江浙行省所置領縣八州一至元十四年分宋都九廂為四隅録事司泰定二年併為左右二録事司所云東北隅即左録事司也尼居蕭山毛檢討竒齡志圓尼師抄化齋糧序云東園多尼居緑塍相接其在民家好佛如洛陽女子上請却髮率連房以棲而至于故家遺閥官姬貴姝往往自為畦稜結廬而居於其中志圎尼師中年去家伐茅而編籬獨以俗姓本沈氏築名沈菴有日矣康熙辛未將勸緣于城自持化簿膜拜豫而請豫以序夫閨中耽淡淨自昔所難况以朱門華屋之子餐金拖繡乃一旦托迹于此汰其膏而毁其飾猶復以齋薪供粥經營樵粒毋乃太苦豫嘗為家太保題墓門之碑疏所自出歎其舅氏京兆公為明熹宗朝名臣當時稱杭州甲族以沈為最其後嗣君輩皆相繼仕宦而第五郎君曽為舉人為蒼梧令者則尼之夫也世事之如幻也久矣長林髙岸已為陂池即數十年來其間家國之興亡城隍之圮復與夫閭閻貧富宦遊荒落凡夫盛而衰衰而盛者亦復何限夫虹生電過倐忽變遷海市山樓到眼而沫而當其盛時炙顔爦手及其衰而悲之乃以解脫之情銷其愛憎舉凡人世遭逢或欣或戚者而一舉而返之空虛則夫愛金錢而吝施捨均未達也夫人之可愛者莫如家室子女之身其所甚愛者尤莫如首髮而以家之盛若此而棄之身與髮之所甚愛若此而捨之却之由是而思天下之可愛而不可戀有如是乎况金錢已毛稚黃洪昉思詩前輩毛稚黃逰東園詩云暮春天氣佳霽色映庭樹羣動恣來還豫亦信豫步東園此城隅扶杖遵微路依依見原疇稍稍開煙霧井術分疆畦蔬果隨所務居人多淳風力作鮮他慕潟鹵宜周均鉏泥適寒沍婦女多秉機兒童學馮瓠稍北地轉曠竹木森交互弱藻漫緑流幽花靜垂露我行不知逺足倦稍休駐風景趣豫前竹橋三四渡吾生困塵埃城邑若奔騖翩翩濁世逰徒為車馬誤偶適樂郊樂蕭然得其素此民真吾徒此鄉亦吾故心賞誰與同郊居良可賦行將卜我鄰亂餘頗相護𬗟懷遇羲皇庶幾在朝暮歸歟望層城東樹挂蟾兔洪昉思東園詩云故苑景全非間逰趣不稀鳩貪桑實醉鼠戀豆根肥日落機絲急風回梵磬微潮鳴留古寺輦路草霏霏二作俱能寫景青門處士元至正間杭魏一隅自號青門處士楊亷夫為作墓銘稱處士醇懿靚深恆懼外撓閉置一室中如處女然雖重客至不得面周親謁請或一見即退平日危坐閲所蓄書幾萬卷然無他制作味其旨而已其言行可為人勸者疏以示諸子凡積為若干帙歿後三月而紅巾寇杭處士之廬與堞舍同燬方諸公孫述黃巢時隱人李業周朴輩不免其身處士何幸哉按青門即東青門僧了心了心宋臨安東城僧也乾道五年撰重建南髙峰塔記云住南髙峰塔道人義圎一日疏其重建大略來東城退居求拙者語以識之老子曰噫余方掩關却掃默據蒲團體乎明靜如冬枯木如古澗水口邊白醭久矣子不憚時流之所忌將無汙先佛之塔廟也耶越三數月圎又來叩請彌篤老子從容合十指爪掌曰諾請從事於此矣翌日與二士夫過西澗入靈石塢由煙霞嶺得支徑徜徉而上松篁蔥蒨羊腸詰曲行香靄間腳膝疲甚遂解衣分塊石而坐取棗栗相勞既而努策藤杖獲小平曠仰視雲根秀拔天骨清癯玉立危層巉巉千仞吾人駭目動心疑將壓焉圓倒屣笑迎若慰吾慕者也老子乃肅儀野次拜手稽首獻文字供以塞其望文多不具載即數語亦蕭散有致自餘軒遂安毛鶴舫際可自餘軒説略云自餘軒者豫友錢君章玉顔其室後之東偏以為燕間偃息之區者也武林地當孔道民居相屬鱗次櫛比雖達官右族曽不得咫尺園林可以逰目而憩足惟茲軒僻居城之東隅風土間靜清池周四五里襟帶其側每煙月淪漣渺焉無際如寄迹鏡湖震澤間幾忘此身之在城市位置亭臺一二絶無排比雕飾曠然如其胸次旁列素垣畫史藍田叔繪奇石數峰嶔﨑歷落其下間植修篁左右相為掩映豫短於目望之以為真幾欲下拜就視之乃知其墨戲也因借憩軒中數月不能去楊琇女郎楊琇字倩玉家東城之羊市明慧娟靚雅善篇咏有西湖竹枝云斷橋西去竹間廬不道山孤人亦孤嶺上梅花知妾是水中萍葉似郎無人皆傳誦之後歸沈遹聲為妾遹聲浣溪紗云一帶髙城蕭寺東逺山映水入簾空箇人凝立畫屏中衣褶暗藏花露濕領巾斜沁粉香融怎禁往事意惺忪為倩玉作也蓋其初曽慕才越禮云莫氏古泉記髙雲閣主人莫雲卿為人任俠好讀書多藏古器舊物康熙辛亥暮春張祖望綱孫過之出觀古錢百餘作莫氏古泉記今撮其略於此曰秦半兩錢大徑寸三分其文八分書曰半兩重十二銖或八銖製自秦始皇帝漢厭勝錢長五寸七分濶一寸八分螭龍折其上下如圭有六小孔其體方兩靣隱起粟文重三兩半製自漢武帝新莽刀錢有柄似刀以黃金錯其文隸書曰一刀直五千製自新莽居攝貨布錢長二寸五分廣一寸首長八分有奇上有孔中有直文其下枝足文篆書曰貨布重二十五銖製自新莽天鳳年大黃布刀長二寸三分色赤首有孔下枝足文篆書曰大黃布刀製亦新室莽嘗自稱黃虞之後漢錯刀長柄似刀柄有環如圈刀文亦有圈或曰漢錯刀吳大泉五百錢大徑寸八分文篆書曰大泉五百重十二銖製自孫吳大泉當千錢大徑寸五分文篆書曰大泉當千重十二銖製亦孫氏宋鵝眼錢形如鵝眼文𨽻書曰小泉直百製自宋廢帝大貨六銖錢大徑寸文篆書曰大貨六銖六之一字文如又腰其重十當五銖之一製有周郭或曰隋陳時行北魏太和五銖錢大徑八分文篆書曰太和五銖永安五銖錢大徑八分篆文曰水安五銖製亦北魏又有異文者曰大布五百背左右有七星劍文上下龜蛇形萬國錢靣作水波文上一字類梵書三字篆書背文有星官月兔雲鶴龜形明月錢外無輪郭篆書曰明月藕心錢形四方長二寸靣濶三分四稜如藕心首形如稱鎚鼻有孔飛馬錢背有飛馬趙特騎勒其背有人執槍騎馬形大泉五十背有齊夀二字上下有龜鶴形左右俞侖背有飛馬形上下絶影背有立馬形阡萬錢背無文靣無文者二其一左右瓶劍形背有日月龜鶴形其一上下有七星龜蛇形又有天下和平世髙通寶天盛元寶漢元通寶光順通寶金世圎寶洪德通寶洪順通寶畫隆元寶延寧通寶慶長通寶寬永通寶宋元通寶皇宋通寶大宋元寶朝鮮通寶右錢十六皆楷書未及考又唐開元至元至正凡四十有一錢俱正品不具録外此永通泉寶南唐李氏錢大唐通寶唐國通寶南唐元宗錢乾元重寶南漢劉龔錢光天元寶前蜀王建錢乾德元寶前蜀王衍錢大世通寶隋賊劉迦論錢天慶元寶契丹主天祚錢順天元寶唐賊史思明銷洛陽銅佛鑄錢龍鳳通寶元末小明王韓林兒錢乾封元寶唐髙宗五代湖南馬殷同有此號唐製小馬氏製大今式小唐錢也大安元寶晉惠帝夏元昊子秉常遼道宗扎拉及金主允濟同有此號大寶通寶梁簡文帝南漢劉鋹海外日本同有此號皇建元寶北齊主髙演西夏主安全同有此號虞宗玫宗瑶虞宗玫字大赤宗瑶字仲皓俱德園司勳子並有才名入復社仁和馮倧字儼公社中知名士也貧而不遇無子病危時屬家人巾車至二虞家為之親治醫藥晝夜不懈及卒二虞中堂門署喪屏庭設司鼓大赤仲皓跪拜謝弔客披上古友朋喪服前輩交誼之篤如此仲皓子黃昊字景明亦能詩在西泠十子之列竹深亭城東地腴美多水而宜竹竹色深碧筍稍晚與西溪種略異洪武中潯陽張羽來儀竹深亭記云杭城之東偏有地曰戚家園周廣十畝通衢外環限以修垣其中民舍若干區舍西有大竹數百竿青秀敷腴蓊若深谷煩囂攸袪忘在闤闠然居人莫知為勝吳興沈君某僦廬于斯悼衆之遺乃增亭竹間以娛宴休命之曰竹深亭亭縱一筵衡廣倍之棟宇簡易疏櫺間靜林園之勝專于是矣丁未之冬豫至自吳門沈君避是亭舍豫居之三月而後去每清風激林驟雨合至飄蕩播灑萬葉交振鷦鷯鴝鵒之類翔萃其中鳴聲啁啾與天籟合乍大乍細聽之無窮故吾知是亭于風雨為宜窮隂之夕雪霰交墜玲瓏蕭條坐聽既久心寒耳凄則就枕而卧中夜聞折竹聲如裂帛如櫟敔清迅激越出人不意乍寐復寤旦起視之髙者竦峭下者披靡琅玕翠碧化為瑶林變眩洞射暗牖皆白故吾知是亭於雪為宜煙霏朝斂黛緑搖翳日光穿漏影布忩上翕忽推移偃仰開合雖善繪者莫能窮其態投林之翼與暝色皆至流霞倒影晃搖其顛久而後沒故吾又知此亭於晴為宜凡人之居有一勝焉猶足以夸况斯亭不出尋丈以極萬變晦眀朝暮攬之不竭茍無所述誠居者之愧乃記豫所厯俾措之壁間然豫又意是亭于夏宜避暑于秋宜玩月惜豫不及其時故無以寫其狀姑闕之以俟來者豫喜此文盡得竹之情狀亟録之駱駝橋夢梁録云艮山門外法眀寺前曰駱駝橋今橋在城內法明寺已久廢橋低而小下為溝通東河東城雜記卷下
